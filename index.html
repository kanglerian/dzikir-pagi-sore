<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dzikir Pagi & Sore</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#059669">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .arabic { font-family: 'Amiri', serif; direction: rtl; }
    .progress-bar { transition: width 0.3s ease; }
    .hidden { display: none; }
  </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col">

  <header class="bg-emerald-600 text-white p-4 shadow-md sticky top-0 z-10">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 id="app-title" class="text-xl font-bold">Dzikir...</h1>
      <div class="flex items-center gap-2">
        <button onclick="toggleMode()" id="mode-badge"
          class="bg-emerald-700 px-3 py-1 rounded-full text-xs font-medium border border-emerald-400">Ganti Waktu</button>
        <button id="notify-btn" onclick="requestNotification()"
          class="bg-emerald-800 text-emerald-200 px-2 py-1 rounded border border-emerald-500 text-[10px]">
          🔔 Notif
        </button>
      </div>
    </div>
    <div class="max-w-md mx-auto mt-3 bg-emerald-800 h-1.5 rounded-full overflow-hidden">
      <div id="progress-indicator" class="progress-bar bg-white h-full" style="width: 0%"></div>
    </div>
  </header>

  <main class="flex-grow flex flex-col items-center p-4 max-w-md mx-auto w-full">
    
    <div id="install-container" class="hidden w-full mb-4">
      <button onclick="installPWA()"
        class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-4 rounded-xl shadow-md flex items-center justify-center gap-2 transition-all">
        📲 Pasang Aplikasi di HP
      </button>
    </div>

    <div id="dzikir-card" onclick="decrementCounter()"
      class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 w-full flex flex-col gap-5 cursor-pointer active:scale-[0.98] transition-transform select-none">
      
      <h2 id="judul-dzikir" class="text-emerald-700 font-bold text-sm uppercase tracking-wide"></h2>
      
      <div id="arabic-text" class="arabic text-3xl leading-relaxed text-right text-slate-800"></div>
      
      <!-- <div id="latin-text" class="text-emerald-600 text-xs font-semibold italic leading-relaxed border-l-2 border-emerald-200 pl-3"></div> -->
      
      <div class="text-slate-600 text-sm leading-relaxed border-t pt-4">
        <p id="translation-text"></p>
      </div>

      <div class="flex justify-center items-center mt-2">
        <div class="relative flex items-center justify-center">
          <svg class="w-32 h-32 transform -rotate-90">
            <circle cx="64" cy="64" r="58" stroke="currentColor" stroke-width="8" fill="transparent" class="text-slate-100" />
            <circle id="counter-ring" cx="64" cy="64" r="58" stroke="currentColor" stroke-width="8" fill="transparent"
              stroke-dasharray="364.4" stroke-dashoffset="0" class="text-emerald-500 transition-all duration-300" />
          </svg>
          <div class="absolute flex flex-col items-center">
            <span id="counter-number" class="text-4xl font-bold text-slate-800">0</span>
            <span class="text-[10px] uppercase text-slate-400 font-bold tracking-widest">Sisa</span>
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 w-full mt-6">
      <button onclick="prevDzikir()" class="py-3 px-4 rounded-xl bg-slate-200 text-slate-700 font-semibold active:bg-slate-300">Kembali</button>
      <button onclick="nextDzikir()" class="py-3 px-4 rounded-xl bg-emerald-100 text-emerald-700 font-semibold active:bg-emerald-200">Lanjut</button>
    </div>

  </main>

  <footer class="p-6 text-center text-slate-400 text-xs">
    <p id="dzikir-index">Memuat data...</p>
    <p class="mt-1 opacity-50 italic">Sumber: Hisnul Muslim Syaikh Sa'id al-Qahthani</p>
  </footer>

  <script>
    let dataDzikir = { pagi: [], sore: [] };
    let currentMode = 'pagi';
    let currentIndex = 0;
    let currentCount = 0;
    let deferredPrompt;

    // 1. LOAD DATA DARI JSON
    async function loadData() {
      try {
        const response = await fetch('dzikr.json');
        dataDzikir = await response.json();
        initApp();
      } catch (error) {
        console.error("Gagal memuat JSON:", error);
        document.getElementById('arabic-text').innerText = "Gagal memuat data. Pastikan file dzikr.json tersedia.";
      }
    }

    function initApp() {
      const hour = new Date().getHours();
      currentMode = (hour >= 15 || hour < 4) ? 'sore' : 'pagi';
      updateUI();
    }

    function updateUI() {
      const list = dataDzikir[currentMode];
      console.log("Current Mode:", currentMode, "List Length:", list ? list.length : 0);
      if (!list || list.length === 0) return;

      const item = list[currentIndex];
      
      document.getElementById('app-title').innerText = `Dzikir ${currentMode === 'pagi' ? 'Pagi' : 'Sore'}`;
      document.getElementById('judul-dzikir').innerText = item.judul;
      document.getElementById('arabic-text').innerText = item.arab;
      // document.getElementById('latin-text').innerText = item.latin || '';
      document.getElementById('translation-text').innerText = item.arti;
      document.getElementById('dzikir-index').innerText = `Dzikir ${currentIndex + 1} dari ${list.length}`;
      
      if (currentCount <= 0) currentCount = item.ulang;
      document.getElementById('counter-number').innerText = currentCount;
      
      updateRing(currentCount, item.ulang);
      document.getElementById('progress-indicator').style.width = `${((currentIndex) / list.length) * 100}%`;
    }

    function updateRing(c, t) {
      const ring = document.getElementById('counter-ring');
      ring.style.strokeDashoffset = 364.4 - (c / t) * 364.4;
    }

    function decrementCounter() {
      if (currentCount > 0) {
        currentCount--;
        if ("vibrate" in navigator) navigator.vibrate(50);
        
        if (currentCount === 0) {
          setTimeout(nextDzikir, 300);
        }
      }
      updateUI();
    }

    function nextDzikir() {
      const list = dataDzikir[currentMode];
      if (currentIndex < list.length - 1) {
        currentIndex++; 
        currentCount = 0; 
        updateUI();
        window.scrollTo(0,0);
      } else { 
        alert("Alhamdulillah, dzikir " + currentMode + " selesai!"); 
        currentIndex = 0; currentCount = 0; updateUI();
      }
    }

    function prevDzikir() {
      if (currentIndex > 0) { 
        currentIndex--; 
        currentCount = 0; 
        updateUI(); 
      }
    }

    function toggleMode() {
      currentMode = currentMode === 'pagi' ? 'sore' : 'pagi';
      currentIndex = 0; currentCount = 0; updateUI();
    }

    // --- FITUR PWA & NOTIFIKASI ---

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        });
      });
    }

    function requestNotification() {
      Notification.requestPermission().then(permission => {
        if (permission === "granted") {
          navigator.serviceWorker.ready.then(reg => {
            reg.showNotification("Dzikir App", { body: "Notifikasi berhasil diaktifkan!" });
          });
        }
      });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-container').classList.remove('hidden');
    });

    async function installPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') document.getElementById('install-container').classList.add('hidden');
      deferredPrompt = null;
    }

    // Mulai Ambil Data
    loadData();
  </script>
</body>
</html>
